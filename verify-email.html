<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verifikasi Email | Luxentra Finance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page" data-page="verify-email">
    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-card__title">VERIFIKASI EMAIL</div>
        <div class="auth-card__body">
          <h1>Verifikasi Email Anda</h1>
          <p>
            Kami telah mengirimkan kode verifikasi ke email anda. Masukan kode
            verifikasi tersebut.
          </p>

          <form class="auth-form">
            <label>
              <span>Kode Verifikasi</span>
              <div class="input-shell">
                <span class="input-icon">#</span>
                <input type="text" placeholder="Masukan kode verifikasi" />
              </div>
            </label>

            <div class="auth-actions">
              <button class="button button--primary button--block" type="submit">Verifikasi</button>
              <button class="button button--ghost button--block" type="button">Kirim Ulang Kode Verifikasi</button>
            </div>
          </form>

          <p class="auth-switch">
            <a href="login.html">Kembali Ke Login</a>
          </p>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
