<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar | Luxentra Finance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page auth-page--register" data-page="register">
    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-card__title">DAFTAR</div>
        <div class="auth-card__body">
          <h1>Mulai Kelola Keuangan Anda</h1>
          <p>Buat akun baru untuk memulai pengalaman finansial yang lebih rapi.</p>

          <form class="auth-form">
            <label>
              <span>Nama Lengkap</span>
              <div class="input-shell">
                <span class="input-icon">👤</span>
                <input type="text" placeholder="Masukan Nama Lengkap Anda" />
              </div>
            </label>

            <label>
              <span>Email</span>
              <div class="input-shell">
                <span class="input-icon">✉</span>
                <input type="email" placeholder="Masukan Email" />
              </div>
            </label>

            <label>
              <span>Password</span>
              <div class="input-shell">
                <span class="input-icon">🔒</span>
                <input type="password" placeholder="Masukan Password" />
              </div>
            </label>

            <label>
              <span>Konfirmasi Password</span>
              <div class="input-shell">
                <span class="input-icon">🔐</span>
                <input type="password" placeholder="Masukan Password Sekali Lagi" />
              </div>
            </label>

            <button class="button button--primary button--block" type="submit">Daftar</button>
          </form>

          <p class="auth-switch">
            Sudah Punya Akun? <a href="login.html">Masuk Disini</a>
          </p>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
