<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password | Luxentra Finance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page" data-page="forgot-password">
    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-card__title">LUPA PASSWORD</div>
        <div class="auth-card__body">
          <h1>Anda Lupa Password?</h1>
          <p>
            Masukan email akun anda. Kami akan mengirimkan kode verifikasi untuk
            meriset password anda.
          </p>

          <form class="auth-form">
            <label>
              <span>Email</span>
              <div class="input-shell">
                <span class="input-icon">✉</span>
                <input type="email" placeholder="Masukan Email" />
              </div>
            </label>

            <button class="button button--primary button--block" type="submit">
              Verifikasi Email Anda
            </button>
          </form>

          <p class="auth-switch">
            <a href="login.html">Kembali Ke Login</a>
          </p>
        </div>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
